    methods: GET
# Reset Password Routes
app_forgot_password_request:
    path: /reset-password
    controller: App\Controller\ResetPasswordController::request

app_check_email:
    path: /reset-password/check-email
    controller: App\Controller\ResetPasswordController::checkEmail

app_reset_password:
    path: /reset/{token}
    controller: App\Controller\ResetPasswordController::reset
# Profile routes
app_profile:
    path: /profile
    controller: App\Controller\ProfileController::index
    methods: GET

app_profile_photo_change:
    path: /profile/photo/change
    controller: App\Controller\ProfileController::changePhoto
    methods: GET|POST

app_profile_photo_remove:
    path: /profile/photo/remove
    controller: App\Controller\ProfileController::removePhoto
    methods: POST
app_face_auth:
    path: /face-auth
    controller: App\Controller\FaceAuthController::index
    methods: GET

app_face_login_page:
