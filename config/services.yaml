parameters:
    app.from_email: '%env(MAILER_FROM_EMAIL)%'
    app.from_name: '%env(MAILER_FROM_NAME)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/Tests/'

    App\Service\EmailService:
        arguments:
            $fromEmail: '%app.from_email%'
            $fromName: '%app.from_name%'

    # Ajout du service Stripe avec la bonne indentation (2 espaces)
    App\Service\StripeService:
        arguments:
            $stripeSecretKey: '%env(STRIPE_SECRET_KEY)%'
            $entityManager: '@doctrine.orm.entity_manager'
            
    App\Service\InvoiceService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    #App\Service\AiService:
        #arguments:
            #$openaiApiKey: '%env(OPENAI_API_KEY)%'